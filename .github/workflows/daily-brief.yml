name: Daily AI Brief Update

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Run daily at 11:00 UTC (6:00 AM EST)
    - cron: '0 11 * * *'
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    # Allows manual runs from the GitHub UI

permissions:
  contents: write

jobs:
  update-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        # We use setup-python to install python 3.10
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # cache pip dependencies

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run Curation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/fetch_brief.py

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Only commit if data/brief.json has actual updates
          if ! git diff --quiet data/brief.json; then
            git add data/brief.json
            git commit -m "chore: automated daily AI Pulse brief update [skip ci]"
            git push
          else
            echo "No updates detected in daily brief data."
          fi
